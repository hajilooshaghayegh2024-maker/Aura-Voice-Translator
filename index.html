<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAHA Translator | EN ↔ FI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="grammar-trigger" id="grammar-open">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <span>Grammar</span>
    </div>

    <div class="vocab-trigger" id="vocab-open">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            <line x1="7" y1="8" x2="17" y2="8"></line>
            <line x1="7" y1="12" x2="17" y2="12"></line>
            <line x1="7" y1="16" x2="13" y2="16"></line>
        </svg>
        <span>Vocabulary</span>
    </div>

    <!-- Grammar Modal -->
    <div id="grammar-modal" class="modal-overlay">
        <div class="modal-content glass">
            <header class="modal-header">
                <h2>Finnish Grammar</h2>
                <button id="grammar-close" class="close-btn">&times;</button>
            </header>

            <nav class="level-nav">
                <button class="level-tab active" data-level="elementary">Elementary</button>
                <button class="level-tab" data-level="intermediate">Intermediate</button>
                <button class="level-tab" data-level="advanced">Advanced</button>
            </nav>

            <div id="grammar-content" class="grammar-body">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Vocabulary Modal -->
    <div id="vocab-modal" class="modal-overlay">
        <div class="modal-content glass">
            <header class="modal-header">
                <div class="header-main">
                    <h2>Word Hub (4000+ Words)</h2>
                    <p class="header-sub">Finnish ↔ English</p>
                </div>
                <button id="vocab-close" class="close-btn">&times;</button>
            </header>

            <div class="search-container glass">
                <input type="text" id="vocab-search" placeholder="Search for a word (e.g. 'koira' or 'dog')...">
            </div>

            <nav class="level-nav">
                <button class="vocab-tab active" data-level="A1">Beginner (A1-A2)</button>
                <button class="vocab-tab" data-level="B1">Intermediate (B1-B2)</button>
                <button class="vocab-tab" data-level="C1">Advanced (C1-C2)</button>
            </nav>

            <div id="vocab-list" class="vocab-grid">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <main class="app-container">
        <header>
            <h1 class="glass-text">RAHA</h1>
            <p class="subtitle">Live Voice Translation</p>
        </header>

        <section class="controls">
            <div class="toggle-container">
                <span class="lang-label" id="label-en">English</span>
                <label class="switch">
                    <input type="checkbox" id="lang-toggle">
                    <span class="slider round"></span>
                </label>
                <span class="lang-label" id="label-fi">Finnish</span>
            </div>
        </section>

        <section class="translation-display">
            <div class="card glass">
                <div class="card-header">
                    <span id="source-title">Listening...</span>
                    <div class="status-indicator" id="status-dot"></div>
                </div>
                <textarea class="text-area" id="source-text"
                    placeholder="Tap the mic or type here to translate..."></textarea>
            </div>

            <div class="card glass result-card">
                <div class="card-header">
                    <span id="target-title">Translation</span>
                </div>
                <div class="text-area translated" id="target-text">Translation will appear here.</div>
            </div>
        </section>

        <section class="action-bar">
            <button id="mic-btn" class="mic-button">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>
        </section>
    </main>

    <footer class="app-footer">
        <a href="https://github.com/hajilooshaghayegh2024-maker/Aura-Voice-Translator" target="_blank"
            class="github-link">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path
                    d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
            </svg>
            View on GitHub
        </a>
    </footer>

    <script src="script.js"></script>
</body>

</html>
